<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>فحص المعدل - مدرسة النيل التعليمية</title>
<meta name="description" content="فحص معدل الطالبة في مدرسة النيل عبر رقم الهوية">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --teal:#0d9488;
  --teal-l:#14b8a6;
  --teal-xl:#99f6e4;
  --teal-bg:#f0fdfa;
  --teal-g:linear-gradient(135deg,#0d9488,#0891b2);
  --bg:#f8fffe;
  --white:#fff;
  --card:#fff;
  --border:#e2e8f0;
  --text:#1e293b;
  --text2:#64748b;
  --text3:#94a3b8;
  --radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 4px 24px rgba(13,148,136,.12);
}
body{
  font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 16px;
  -webkit-font-smoothing:antialiased;
}

/* الهيدر */
.header{
  width:100%;max-width:440px;
  text-align:center;
  padding-top:max(5dvh,28px);
  padding-bottom:8px;
}
.icon{
  width:60px;height:60px;
  background:var(--teal-g);
  border-radius:16px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;
  box-shadow:var(--shadow-lg);
  margin-bottom:14px;
}
h1{
  font-size:1.45rem;font-weight:700;
  color:var(--teal);
  margin-bottom:2px;
}
.sub{color:var(--text2);font-size:.88rem;font-weight:400}

/* البحث */
.search{
  width:100%;max-width:440px;
  margin-top:28px;
}
.input-wrap{
  position:relative;
  margin-bottom:10px;
}
.input-wrap input{
  width:100%;
  padding:15px 18px 15px 48px;
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  font-family:inherit;
  font-size:1rem;font-weight:500;
  outline:none;
  transition:border .2s,box-shadow .2s;
  -webkit-appearance:none;
  text-align:right;direction:ltr;
  letter-spacing:.3px;
}
.input-wrap input::placeholder{
  color:var(--text3);font-weight:400;
  direction:rtl;letter-spacing:0;
}
.input-wrap input:focus{
  border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(13,148,136,.1);
}
.input-wrap svg{
  position:absolute;left:15px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;width:20px;height:20px;
}
.btn{
  width:100%;
  padding:14px;
  background:var(--teal-g);
  border:none;border-radius:var(--radius);
  color:#fff;font-family:inherit;
  font-size:.95rem;font-weight:600;
  cursor:pointer;
  transition:opacity .2s,transform .1s;
  box-shadow:var(--shadow-lg);
}
.btn:hover{opacity:.92}
.btn:active{transform:scale(.98)}

/* النتيجة */
#res{
  width:100%;max-width:440px;
  margin-top:24px;
  display:none;
  animation:up .4s cubic-bezier(.22,1,.36,1);
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.card{
  background:var(--white);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  border:1px solid var(--border);
}
.card-top{
  background:var(--teal-bg);
  padding:20px;
  text-align:center;
  border-bottom:1px solid rgba(13,148,136,.1);
}
.card-top h2{font-size:1.15rem;font-weight:700;color:var(--text);margin-bottom:3px}
.card-top .cls{color:var(--teal);font-size:.82rem;font-weight:500}

.avg-section{
  padding:28px 20px;
  text-align:center;
}
.avg-label{color:var(--text2);font-size:.78rem;font-weight:400;margin-bottom:8px}
.avg-num{
  font-size:3.2rem;font-weight:700;
  color:var(--teal);
  line-height:1;
}
.avg-badge{
  display:inline-block;
  margin-top:12px;
  padding:5px 16px;
  border-radius:20px;
  font-size:.8rem;font-weight:600;
  background:var(--teal-bg);
  color:var(--teal);
}
.avg-badge.warn{background:#fef9c3;color:#a16207}
.avg-badge.danger{background:#fee2e2;color:#b91c1c}

/* خطأ */
#err{
  width:100%;max-width:440px;
  margin-top:24px;
  padding:18px;
  background:#fff;
  border:1.5px solid #fecaca;
  border-radius:var(--radius);
  text-align:center;
  color:#b91c1c;
  font-size:.9rem;
  display:none;
  animation:up .35s ease;
}

/* الفوتر */
.footer{
  width:100%;max-width:440px;
  margin-top:auto;
  padding:32px 0 20px;
  text-align:center;
}
.footer .line{
  width:40px;height:2px;
  background:var(--teal-xl);
  margin:0 auto 14px;
  border-radius:2px;
}
.footer p{
  color:var(--text2);
  font-size:.78rem;
  line-height:1.7;
}
.footer .name{
  color:var(--teal);
  font-weight:600;
}
</style>
</head>
<body>

<div class="header">
  <div class="icon">🎓</div>
  <h1>مدرسة النيل التعليمية للطالبات</h1>
  <p class="sub">فحص معدل الطالبة</p>
</div>

<div class="search">
  <div class="input-wrap">

    <input type="tel" id="sid" placeholder="أدخلي رقم الهوية" inputmode="numeric" autocomplete="off">
  </div>
  <button class="btn" id="go">فحص المعدل</button>
</div>

<div id="err">لم يتم العثور على طالب بهذا الرقم، تأكد من صحة رقم الهوية.</div>

<div id="res">
  <div class="card">
    <div class="card-top">
      <h2 id="rN"></h2>
      <div class="cls" id="rC"></div>
    </div>
    <div class="avg-section">
      <div class="avg-label">المعدل العام</div>
      <div class="avg-num" id="rA"></div>
      <div class="avg-badge" id="rB"></div>
    </div>
  </div>
</div>

<div class="footer">
  <div class="line"></div>
  <p>مع تحيات مديرة المدرسة</p>
  <p class="name">أ. مها الوالي</p>
</div>

<script>
const $=id=>document.getElementById(id);

function search(){
  const id=$('sid').value.trim();
  $('res').style.display='none';
  $('err').style.display='none';
  if(!id)return;
  const s=S[id];
  if(!s){$('err').style.display='block';return}
  $('rN').textContent=s[0];
  $('rC').textContent=s[1];
  const a=s[2];
  $('rA').textContent=a;
  const b=$('rB');
  if(a>=90){b.textContent='ممتاز';b.className='avg-badge'}
  else if(a>=80){b.textContent='جيد جداً';b.className='avg-badge'}
  else if(a>=70){b.textContent='جيد';b.className='avg-badge warn'}
  else if(a>=60){b.textContent='مقبول';b.className='avg-badge warn'}
  else{b.textContent='ضعيف';b.className='avg-badge danger'}
  $('res').style.display='block';
  $('res').scrollIntoView({behavior:'smooth',block:'nearest'});
}

$('go').onclick=search;
$('sid').onkeydown=e=>{if(e.key==='Enter')search()};
</script>
